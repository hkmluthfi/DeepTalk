<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>DeepTalk — Percakapan Bermakna Dimulai dari Satu Pertanyaan</title>
  <meta name="description" content="DeepTalk membantu kamu memulai percakapan yang lebih bermakna melalui kartu pertanyaan yang mendalam, elegan, dan bermakna." />
  <meta name="keywords" content="deep talk, percakapan bermakna, kartu pertanyaan, refleksi diri, ice breaker" />
  <meta name="author" content="DeepTalk" />

  <!-- Open Graph -->
  <meta property="og:title" content="DeepTalk — Percakapan Bermakna" />
  <meta property="og:description" content="Setiap percakapan yang bermakna dimulai dari satu pertanyaan." />
  <meta property="og:type" content="website" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════════
       DeepTalk — CSS
       Sistem desain yang tenang, elegan, dan penuh white space.
       ═══════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────────
       1. DESIGN TOKENS
    ───────────────────────────────────────────── */
    :root {
      --color-bg:           #F8F7F4;
      --color-surface:      #FFFFFF;
      --color-primary:      #5D5FEF;
      --color-primary-dark: #4446D0;
      --color-primary-soft: #EDEDFF;
      --color-text:         #222222;
      --color-text-muted:   #888888;
      --color-text-light:   #BBBBBB;
      --color-badge-bg:     #F0F0FE;
      --color-badge-text:   #5D5FEF;
      --depth-ringan:       #27AE60;
      --depth-sedang:       #F2C94C;
      --depth-dalam:        #F2994A;
      --depth-sangat-dalam: #EB5757;
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
      --shadow-md:    0 8px 32px rgba(0,0,0,0.09);
      --shadow-lg:    0 20px 60px rgba(0,0,0,0.12);
      --shadow-card:  0 4px 24px rgba(93,95,239,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --font-family:  'Poppins', sans-serif;
      --radius-full:  9999px;
      --radius-lg:    24px;
      --transition-fast:   0.15s ease;
      --transition-normal: 0.25s ease;
      --transition-flip:   0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    /* ─────────────────────────────────────────────
       2. RESET & BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: var(--font-family); cursor: pointer; border: none; outline: none; }
    blockquote { quotes: none; }

    /* ─────────────────────────────────────────────
       3. PAGE SYSTEM
    ───────────────────────────────────────────── */
    .page { display: none; min-height: 100vh; position: relative; }
    .page.active { display: flex; flex-direction: column; }

    /* ─────────────────────────────────────────────
       4. LANDING PAGE
    ───────────────────────────────────────────── */
    #landing-page { align-items: center; justify-content: center; overflow: hidden; }

    .landing-container {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 2rem;
      padding: 3rem 2rem; position: relative; z-index: 2;
      max-width: 480px; width: 100%;
    }

    .brand-icon { display: flex; gap: 6px; justify-content: center; margin-bottom: 0.5rem; }
    .brand-icon-dot {
      width: 8px; height: 8px; border-radius: var(--radius-full);
      background-color: var(--color-primary);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .brand-icon-dot:nth-child(1) { animation-delay: 0s;   opacity: 0.5; }
    .brand-icon-dot:nth-child(2) { animation-delay: 0.3s; opacity: 0.7; }
    .brand-icon-dot:nth-child(3) { animation-delay: 0.6s; opacity: 1;   }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.3); opacity: 1; }
    }

    .landing-title {
      font-size: clamp(2.8rem, 8vw, 4.5rem); font-weight: 700;
      letter-spacing: -0.03em; color: var(--color-text); line-height: 1.1;
    }
    .landing-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.15rem); font-weight: 300;
      color: var(--color-text-muted); line-height: 1.75; letter-spacing: 0.01em;
    }
    .landing-hint { font-size: 0.78rem; color: var(--color-text-light); letter-spacing: 0.02em; }

    .landing-brand { animation: fade-up 0.7s ease both; }
    #btn-mulai     { animation: fade-up 0.7s 0.15s ease both; }
    .landing-hint  { animation: fade-up 0.7s 0.25s ease both; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Dekorasi bg */
    .landing-bg-decoration { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .deco-circle {
      position: absolute; border-radius: var(--radius-full);
      background: radial-gradient(circle, var(--color-primary), transparent 70%); opacity: 0.05;
    }
    .deco-circle--1 { width:400px; height:400px; top:-100px; right:-80px;  animation: float-slow 8s  ease-in-out infinite; }
    .deco-circle--2 { width:280px; height:280px; bottom:40px; left:-60px;  animation: float-slow 10s ease-in-out infinite reverse; }
    .deco-circle--3 { width:180px; height:180px; top:50%; left:30%; opacity:0.03; animation: float-slow 6s ease-in-out infinite 2s; }

    @keyframes float-slow {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-20px) scale(1.05); }
    }

    /* ─────────────────────────────────────────────
       5. BUTTONS
    ───────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.875rem 2.25rem; border-radius: var(--radius-full);
      font-size: 1rem; font-weight: 500; letter-spacing: 0.01em;
      transition: background-color var(--transition-normal),
                  transform var(--transition-fast),
                  box-shadow var(--transition-normal),
                  opacity var(--transition-normal);
    }
    .btn-primary {
      background-color: var(--color-primary); color: #FFF;
      box-shadow: 0 4px 20px rgba(93,95,239,0.3);
    }
    .btn-primary:hover  { background-color: var(--color-primary-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(93,95,239,0.4); }
    .btn-primary:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(93,95,239,0.25); }
    .btn-large  { padding: 1.1rem 3rem; font-size: 1.05rem; font-weight: 600; }
    .btn-secondary {
      background-color: transparent; color: var(--color-primary);
      border: 2px solid var(--color-primary);
    }
    .btn-secondary:hover  { background-color: var(--color-primary-soft); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .btn-secondary:active { transform: translateY(0); }
    .btn-ghost {
      background-color: transparent; color: var(--color-text-muted);
      padding: 0.5rem 1.25rem; font-size: 0.875rem;
    }
    .btn-ghost:hover { color: var(--color-text); background-color: rgba(0,0,0,0.04); }
    .hidden { display: none !important; }
    .btn:disabled, .btn.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; transform: none !important; }

    /* ─────────────────────────────────────────────
       6. HEADER
    ───────────────────────────────────────────── */
    .header {
      padding: 1rem 2rem;
      background-color: rgba(248,247,244,0.9);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo { display: flex; align-items: center; gap: 0.25rem; }
    .header-logo-dot {
      width: 8px; height: 8px; border-radius: var(--radius-full);
      background-color: var(--color-primary); display: inline-block;
    }
    .header-logo-text { font-size: 1.15rem; font-weight: 700; color: var(--color-text); letter-spacing: -0.01em; }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
    .nav-link { font-size: 0.875rem; font-weight: 400; color: var(--color-text-muted); transition: color var(--transition-fast); }
    .nav-link:hover { color: var(--color-text); }

    /* ─────────────────────────────────────────────
       7. MAIN CONTENT
    ───────────────────────────────────────────── */
    .main-content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem; gap: 2rem;
      max-width: 720px; margin: 0 auto; width: 100%;
    }

    /* ─────────────────────────────────────────────
       8. PROGRESS
    ───────────────────────────────────────────── */
    .progress-section { text-align: center; }
    .progress-text {
      font-size: 0.82rem; color: var(--color-text-muted);
      font-weight: 400; letter-spacing: 0.03em; text-transform: uppercase;
    }

    /* ─────────────────────────────────────────────
       9. FLIP CARD
    ───────────────────────────────────────────── */
    .card-wrapper { width: 100%; max-width: 480px; perspective: 1200px; }
    .card-flip-container { width: 100%; height: 320px; position: relative; }
    .card-flipper {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform var(--transition-flip);
    }
    .card-flipper.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; border-radius: var(--radius-lg);
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }

    /* Front */
    .card-front {
      background: linear-gradient(145deg, #5D5FEF 0%, #4446D0 100%);
      box-shadow: var(--shadow-lg);
      display: flex; align-items: center; justify-content: center;
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }
    .card-flip-container:hover .card-front {
      transform: scale(1.015);
      box-shadow: 0 24px 70px rgba(93,95,239,0.25), 0 4px 16px rgba(0,0,0,0.1);
    }
    .card-flipper.flipped .card-front { pointer-events: none; }

    .card-front-content {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem; text-align: center; color: rgba(255,255,255,0.9);
      padding: 2rem; user-select: none;
    }
    .card-logo { display: flex; gap: 5px; }
    .card-logo-dot { width: 7px; height: 7px; border-radius: var(--radius-full); background-color: rgba(255,255,255,0.7); }
    .card-front-label { font-size: 1.5rem; font-weight: 700; color: #FFF; letter-spacing: -0.01em; }
    .card-front-hint  { font-size: 0.82rem; color: rgba(255,255,255,0.6); line-height: 1.7; }

    /* Back */
    .card-back {
      background-color: var(--color-surface);
      box-shadow: var(--shadow-card);
      transform: rotateY(180deg);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(0,0,0,0.04);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }
    .card-flipper.flipped:hover .card-back {
      transform: rotateY(180deg) scale(1.015);
      box-shadow: var(--shadow-lg);
    }
    .card-back-content {
      padding: 2rem 3rem; display: flex; flex-direction: column;
      gap: 1.5rem; width: 100%; height: 100%; justify-content: center;
    }
    .card-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .card-question {
      font-size: clamp(1.05rem, 2.5vw, 1.25rem); font-weight: 500;
      color: var(--color-text); line-height: 1.65;
      letter-spacing: -0.01em; font-style: normal;
    }
    .card-question.animate-in { animation: question-in 0.35s ease both; }

    @keyframes question-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────────
       10. BADGES
    ───────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: var(--radius-full);
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.03em;
    }
    .badge-category { background-color: var(--color-badge-bg); color: var(--color-badge-text); }
    .badge-depth    { color: #FFF; font-weight: 600; }
    .badge-depth[data-depth="Ringan"]       { background-color: var(--depth-ringan); }
    .badge-depth[data-depth="Sedang"]       { background-color: var(--depth-sedang); color: #555; }
    .badge-depth[data-depth="Dalam"]        { background-color: var(--depth-dalam); }
    .badge-depth[data-depth="Sangat Dalam"] { background-color: var(--depth-sangat-dalam); }
    .badge-depth::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      border-radius: var(--radius-full); background-color: rgba(255,255,255,0.6);
    }
    .badge-depth[data-depth="Sedang"]::before { background-color: rgba(0,0,0,0.25); }

    /* ─────────────────────────────────────────────
       11. ACTION BUTTONS
    ───────────────────────────────────────────── */
    .action-buttons { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

    /* ─────────────────────────────────────────────
       12. FOOTER
    ───────────────────────────────────────────── */
    .footer { padding: 1.5rem 2rem; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); }
    .footer-text { font-size: 0.78rem; color: var(--color-text-light); letter-spacing: 0.02em; }

    /* ─────────────────────────────────────────────
       13. SESSION COMPLETE
    ───────────────────────────────────────────── */
    .card-back.session-complete { background: linear-gradient(145deg, #f8f7f4 0%, #f0f0fe 100%); }
    .session-complete-content {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center;
      gap: 1rem; padding: 2rem;
    }
    .session-complete-icon    { font-size: 2rem; line-height: 1; }
    .session-complete-title   { font-size: 1.15rem; font-weight: 600; color: var(--color-text); }
    .session-complete-subtitle { font-size: 0.85rem; color: var(--color-text-muted); line-height: 1.7; }

    /* ─────────────────────────────────────────────
       14. RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .main-content { padding: 2rem 1.5rem; gap: 1.5rem; }
      .card-flip-container { height: 280px; }
      .card-back-content { padding: 1.5rem 2rem; }
      .header { padding: 1rem 1.5rem; }
    }
    @media (max-width: 480px) {
      .main-content { padding: 1.5rem 1rem; gap: 1.5rem; }
      .card-flip-container { height: 260px; }
      .card-back-content { padding: 1.5rem; }
      .card-question { font-size: 1rem; }
      .header-nav { gap: 1rem; }
      .btn { padding: 0.8rem 1.75rem; font-size: 0.95rem; }
      .btn-large { padding: 1rem 2.5rem; }
      .landing-container { padding: 2rem 1rem; gap: 1.5rem; }
    }
    @media (max-width: 360px) {
      .card-flip-container { height: 240px; }
      .card-back-content { padding: 1rem; }
      .card-question { font-size: 0.95rem; }
      .header-logo-text { font-size: 1rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       LANDING PAGE
  ══════════════════════════════════════════ -->
  <section id="landing-page" class="page active" aria-label="Halaman Pembuka">
    <div class="landing-container">
      <div class="landing-brand">
        <div class="brand-icon" aria-hidden="true">
          <span class="brand-icon-dot"></span>
          <span class="brand-icon-dot"></span>
          <span class="brand-icon-dot"></span>
        </div>
        <h1 class="landing-title">DeepTalk</h1>
        <p class="landing-subtitle">
          Setiap percakapan yang bermakna<br />dimulai dari satu pertanyaan.
        </p>
      </div>
      <button id="btn-mulai" class="btn btn-primary btn-large" aria-label="Mulai menggunakan DeepTalk">
        Mulai
      </button>
      <p class="landing-hint">220+ pertanyaan &bull; 10 kategori &bull; 4 tingkat kedalaman</p>
    </div>
    <div class="landing-bg-decoration" aria-hidden="true">
      <div class="deco-circle deco-circle--1"></div>
      <div class="deco-circle deco-circle--2"></div>
      <div class="deco-circle deco-circle--3"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       MAIN PAGE
  ══════════════════════════════════════════ -->
  <section id="main-page" class="page" aria-label="Halaman Utama DeepTalk">

    <header class="header" role="banner">
      <div class="header-inner">
        <div class="header-logo" role="img" aria-label="DeepTalk Logo">
          <span class="header-logo-dot" aria-hidden="true"></span>
          <span class="header-logo-text">DeepTalk</span>
        </div>
        <nav class="header-nav" aria-label="Navigasi Utama">
          <a href="#" class="nav-link" id="nav-tentang">Tentang</a>
          <a href="#" class="nav-link" id="nav-github">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="main-content" role="main">

      <div class="progress-section" aria-live="polite" aria-atomic="true">
        <p class="progress-text" id="progress-text">Siap membuka kartu pertama</p>
      </div>

      <div class="card-wrapper" role="region" aria-label="Kartu Pertanyaan">
        <div class="card-flip-container" id="card-flip-container">
          <div class="card-flipper" id="card-flipper" aria-live="polite">

            <!-- Front -->
            <div class="card-face card-front" id="card-front" aria-label="Kartu tertutup">
              <div class="card-front-content">
                <div class="card-logo" aria-hidden="true">
                  <span class="card-logo-dot"></span>
                  <span class="card-logo-dot"></span>
                  <span class="card-logo-dot"></span>
                </div>
                <p class="card-front-label">DeepTalk</p>
                <p class="card-front-hint">Tekan tombol di bawah<br/>untuk membuka kartu</p>
              </div>
            </div>

            <!-- Back -->
            <div class="card-face card-back" id="card-back" aria-label="Kartu pertanyaan">
              <div class="card-back-content">
                <div class="card-badges" id="card-badges">
                  <span class="badge badge-category" id="badge-category" aria-label="Kategori pertanyaan"></span>
                  <span class="badge badge-depth"    id="badge-depth"    aria-label="Tingkat kedalaman"></span>
                </div>
                <blockquote class="card-question" id="card-question" aria-live="polite"></blockquote>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="action-buttons" role="group" aria-label="Tombol Aksi">
        <button id="btn-ambil"      class="btn btn-primary"            aria-label="Ambil satu pertanyaan secara acak">Ambil Kartu</button>
        <button id="btn-berikutnya" class="btn btn-secondary hidden"   aria-label="Ambil pertanyaan berikutnya">Pertanyaan Berikutnya</button>
        <button id="btn-reset"      class="btn btn-ghost hidden"       aria-label="Mulai sesi baru">Mulai Sesi Baru</button>
      </div>

    </main>

    <footer class="footer" role="contentinfo">
      <p class="footer-text">DeepTalk &mdash; Percakapan bermakna dimulai dari satu pertanyaan.</p>
    </footer>

  </section>

  <script>
    /* ═══════════════════════════════════════════════════════════
       DeepTalk — DATA: 220 Pertanyaan dari 10 Kategori
       Format: { category, depth, question }
       Depth: "Ringan" | "Sedang" | "Dalam" | "Sangat Dalam"
       ═══════════════════════════════════════════════════════════ */
    const questions = [

      // ICE BREAKER (22)
      { category:"Ice Breaker", depth:"Ringan",  question:"Kalau kamu bisa makan satu makanan seumur hidup tanpa bosan, apa pilihanmu?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Apa hal pertama yang kamu lakukan setiap pagi?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Tim mana yang selalu kamu dukung — kucing atau anjing?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Lagu apa yang sering kamu putar ulang belakangan ini?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Kalau hidupmu dijadikan film, genre apa yang paling cocok?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Hal kecil apa yang selalu berhasil membuatmu tersenyum?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Kamu lebih suka liburan ke pantai atau ke pegunungan?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Apa hobi yang ingin kamu coba tapi belum sempat?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Kalau kamu punya satu hari bebas tanpa tanggung jawab, kamu mau apa?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Buku, film, atau serial apa yang terakhir kamu nikmati?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Minuman apa yang paling sering ada di meja kerjamu?" },
      { category:"Ice Breaker", depth:"Ringan",  question:"Apa kata orang-orang terdekat yang paling sering menggambarkanmu?" },
      { category:"Ice Breaker", depth:"Sedang",  question:"Apakah kamu tipe orang yang suka merencanakan sesuatu atau lebih suka spontan?" },
      { category:"Ice Breaker", depth:"Sedang",  question:"Hal apa yang paling sering membuat rencana harianmu berantakan?" },
      { category:"Ice Breaker", depth:"Sedang",  question:"Kebiasaan apa yang kamu miliki yang mungkin tidak disadari orang lain?" },
      { category:"Ice Breaker", depth:"Sedang",  question:"Apa satu kemampuan tersembunyi yang dimilikimu yang jarang orang tahu?" },

      { category:"Mendalam", depth:"Sangat Dalam", question:"Kapan terakhir kali kamu merasa benar-benar tenang dan utuh?" },
      { category:"Mendalam", depth:"Sangat Dalam", question:"Apa yang paling kamu takutkan orang lain tahu tentangmu?" },

      { category:"Mendalam", depth:"Dalam",        question:"Apa satu hal yang benar-benar kamu inginkan tapi takut untuk memintanya?" },
      { category:"Mendalam", depth:"Sangat Dalam", question:"Siapa satu orang yang benar-benar mau kamu percayai segalanya?" },
      { category:"Mendalam", depth:"Sangat Dalam", question:"Apakah kamu pernah merasa dunia akan lebih baik tanpa kehadiranmu?" },

      { category:"Mendalam", depth:"Sangat Dalam", question:"Apakah ada sesuatu yang kamu takut tidak akan pernah tercapai?" },
      { category:"Mendalam", depth:"Dalam",        question:"Apa yang paling ingin kamu dengar dari orang yang paling penting dalam hidupmu?" },
      { category:"Mendalam", depth:"Sangat Dalam", question:"Apakah kamu benar-benar bahagia, atau hanya terbiasa berpura-pura bahagia?" },
      { category:"Mendalam", depth:"Sangat Dalam", question:"Kalau hidupmu berakhir besok, apa satu hal yang paling kamu sesali belum lakukan?" }

    /* ═══════════════════════════════════════════════════════════
       DeepTalk — JAVASCRIPT
       ═══════════════════════════════════════════════════════════ */
    'use strict';

    // ── State ─────────────────────────────────────────────────
    const state = {
      allQuestions:      questions,
      remainingQuestions:[],
      currentQuestion:   null,
      cardCount:         0,
      isFlipped:         false,
      isAnimating:       false,
      isSessionComplete: false,
    };

    // ── DOM refs ───────────────────────────────────────────────
    const dom = {
      landingPage:   () => document.getElementById('landing-page'),
      mainPage:      () => document.getElementById('main-page'),
      btnMulai:      () => document.getElementById('btn-mulai'),
      progressText:  () => document.getElementById('progress-text'),
      cardFlipper:   () => document.getElementById('card-flipper'),
      cardBack:      () => document.getElementById('card-back'),
      cardQuestion:  () => document.getElementById('card-question'),
      badgeCategory: () => document.getElementById('badge-category'),
      badgeDepth:    () => document.getElementById('badge-depth'),
      btnAmbil:      () => document.getElementById('btn-ambil'),
      btnBerikutnya: () => document.getElementById('btn-berikutnya'),
      btnReset:      () => document.getElementById('btn-reset'),
    };

    const FLIP_DURATION_MS = 500;

    // ── Init ───────────────────────────────────────────────────
    function init() {
      dom.btnMulai().addEventListener('click', () => { showPage('main'); initSession(); });
      dom.btnAmbil().addEventListener('click', () => { if (!state.isAnimating) loadQuestion(); });
      dom.btnBerikutnya().addEventListener('click', () => { if (!state.isAnimating) loadQuestion(); });
      dom.btnReset().addEventListener('click', resetSession);
    }

    // ── Session ────────────────────────────────────────────────
    function initSession() {
      state.remainingQuestions = shuffleArray([...state.allQuestions]);
      state.currentQuestion    = null;
      state.cardCount          = 0;
      state.isFlipped          = false;
      state.isAnimating        = false;
      state.isSessionComplete  = false;
      dom.cardFlipper().classList.remove('flipped');
      dom.cardBack().classList.remove('session-complete');
      updateProgress();
      updateButtons('initial');
    }

    function resetSession() { initSession(); }

    // ── Core logic ─────────────────────────────────────────────
    function getRandomQuestion() {
      if (state.remainingQuestions.length === 0) return null;
      return state.remainingQuestions.shift();
    }

    function loadQuestion() {
      const question = getRandomQuestion();
      if (!question) { handleSessionComplete(); return; }
      state.currentQuestion = question;
      state.cardCount++;
      updateProgress();
      updateButtons('loading');
      if (!state.isFlipped) {
        flipCard(() => { displayQuestion(question); updateButtons('showing'); });
      } else {
        reflipCard(() => { displayQuestion(question); updateButtons('showing'); });
      }
    }

    function displayQuestion(question) {
      const elQ = dom.cardQuestion();
      elQ.textContent = question.question;
      elQ.classList.remove('animate-in');
      void elQ.offsetWidth;
      elQ.classList.add('animate-in');
      dom.badgeCategory().textContent = question.category;
      dom.badgeDepth().textContent    = question.depth;
      dom.badgeDepth().setAttribute('data-depth', question.depth);
    }

    function updateProgress() {
      const el    = dom.progressText();
      const total = state.allQuestions.length;
      if (state.cardCount === 0) { el.textContent = 'Siap membuka kartu pertama'; return; }
      el.textContent = `Pertanyaan ${state.cardCount} dari ${total}`;
    }

    function updateButtons(situation) {
      const a = dom.btnAmbil(), b = dom.btnBerikutnya(), r = dom.btnReset();
      switch (situation) {
        case 'initial':  a.classList.remove('hidden'); b.classList.add('hidden');    r.classList.add('hidden');    a.disabled=false; break;
        case 'loading':  a.disabled=true; b.disabled=true; break;
        case 'showing':  a.classList.add('hidden');    b.classList.remove('hidden'); r.classList.remove('hidden'); b.disabled=false; r.disabled=false; break;
        case 'complete': a.classList.add('hidden');    b.classList.add('hidden');    r.classList.remove('hidden'); r.disabled=false; break;
      }
    }

    // ── Animation ──────────────────────────────────────────────
    function flipCard(onHalfway) {
      state.isAnimating = true;
      setTimeout(() => { if (typeof onHalfway === 'function') onHalfway(); }, FLIP_DURATION_MS / 2);
      dom.cardFlipper().classList.add('flipped');
      state.isFlipped = true;
      setTimeout(() => { state.isAnimating = false; }, FLIP_DURATION_MS);
    }

    function reflipCard(onComplete) {
      state.isAnimating = true;
      const flipper = dom.cardFlipper();
      flipper.classList.remove('flipped');
      state.isFlipped = false;
      setTimeout(() => {
        if (typeof onComplete === 'function') onComplete();
        requestAnimationFrame(() => { flipper.classList.add('flipped'); state.isFlipped = true; });
      }, FLIP_DURATION_MS);
      setTimeout(() => { state.isAnimating = false; }, FLIP_DURATION_MS * 2 + 50);
    }

    // ── Session complete ───────────────────────────────────────
    function handleSessionComplete() {
      state.isSessionComplete = true;
      if (!state.isFlipped) { dom.cardFlipper().classList.add('flipped'); state.isFlipped = true; }
      const cardBack = dom.cardBack();
      cardBack.classList.add('session-complete');
      cardBack.querySelector('.card-back-content').innerHTML = `
        <div class="session-complete-content">
          <div class="session-complete-icon">✦</div>
          <p class="session-complete-title">Semua pertanyaan sudah terbuka</p>
          <p class="session-complete-subtitle">
            Kamu telah membuka <strong>${state.cardCount}</strong> pertanyaan dalam sesi ini.<br />
            Tekan tombol di bawah untuk memulai sesi baru.
          </p>
        </div>`;
      dom.progressText().textContent = `Selesai — ${state.cardCount} pertanyaan dibuka`;
      updateButtons('complete');
    }

    // ── Page navigation ────────────────────────────────────────
    function showPage(pageName) {
      const pages = { landing: dom.landingPage(), main: dom.mainPage() };
      Object.values(pages).forEach(p => p.classList.remove('active'));
      if (pages[pageName]) pages[pageName].classList.add('active');
    }

    // ── Utilities ──────────────────────────────────────────────
    function shuffleArray(array) {
      const s = [...array];
      for (let i = s.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [s[i], s[j]] = [s[j], s[i]];
      }
      return s;
    }

    // ── Entry point ────────────────────────────────────────────
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
